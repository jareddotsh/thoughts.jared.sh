title: jared's thoughts
description: My thoughts on things.
url: "https://thoughts.jared.sh"
baseurl: ""

author:
  name: jared.sh
  links:
    - title: GitHub
      url: https://github.com/jareddotsh
    - title: Instagram
      url: https://instagram.com/jared.sh
    - title: Feed
      url: /feed.xml

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /posts/:year/:month/:day/:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-relative-links
  - jekyll-paginate

# Relative links plugin
relative_links:
  enabled: true

# Paginate settings
paginate: 10
paginate_path: /page/:num/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - index.md
  - vendor/
  - .bundle/
